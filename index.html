<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creative Storytelling Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #ffe0ec, #d0f0ff);
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .chat-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 520px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .chat-log {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 10px;
    }

    .message {
      margin: 0.5rem 0;
      padding: 0.75rem 1rem;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
      animation: fadeIn 0.4s ease-in-out;
    }

    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }

    .user {
      background: #ff6f91;
      color: white;
      align-self: flex-end;
    }

    input, button {
      padding: 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 0.5rem;
    }

    input {
      flex: 1;
      margin-right: 0.5rem;
    }

    button {
      background: #ff6f91;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #ff3c6f;
    }

    .input-row {
      display: flex;
    }

    .output {
      margin-top: 1rem;
      background: #f9f9f9;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid #ddd;
      white-space: pre-line;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-log" id="chatLog">
      <div class="message bot">👋 Hi buddy! What's your name?</div>
    </div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Type your answer..." />
      <button onclick="handleUserInput()">Send</button>
    </div>
    <div class="output" id="output"></div>
  </div>

  <script>
    const API_KEY = "AIzaSyBV-OVSeQpJyWjFxTb2Fj4vOIDV9Vm5Zcc"; // Replace with your Gemini API key

    const questions = [
      "🎭 What type of story would you like to create? (e.g. Inspirational, Emotional, Heroic)",
      "🌈 What theme or message should the story carry? (e.g. Hope, Unity, Kindness)",
      "🧍 Who is the main character or group in your story?",
      "📖 Share a moment or detail that should be in the story.",
      "📢 What do you want people to feel or do after reading it?",
      "📝 What format should the story be in? (Blog / Social Post / Speech / Flyer)"
    ];

    let currentStep = -1;
    let responses = [];
    let userName = "";

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.innerHTML = text;
      document.getElementById("chatLog").appendChild(msg);
      document.getElementById("chatLog").scrollTop = document.getElementById("chatLog").scrollHeight;
    }

    function handleUserInput() {
      const input = document.getElementById("userInput").value.trim();
      if (!input) return;

      addMessage(input, "user");
      document.getElementById("userInput").value = "";

      if (currentStep === -1) {
        userName = input;
        currentStep = 0;
        setTimeout(() => addMessage(`Nice to meet you, ${userName}! Let's create a powerful story together.`, "bot"), 500);
        setTimeout(() => addMessage(questions[currentStep], "bot"), 1000);
      } else {
        responses.push(input);
        currentStep++;
        if (currentStep < questions.length) {
          setTimeout(() => addMessage(questions[currentStep], "bot"), 500);
        } else {
          generateStory();
        }
      }
    }

    async function generateStory() {
      const [type, theme, character, detail, emotion, format] = responses;

      const prompt = `
You are a creative storyteller.
Write a compelling ${format} with the following details:

- Story Type: ${type}
- Theme/Message: ${theme}
- Main Character: ${character}
- Key Detail: ${detail}
- Desired Impact: ${emotion}

Make it vivid, emotional, and ready to share.
Use headings, short sentences, and emojis where appropriate.
`;

      addMessage("⏳ Crafting your story...", "bot");

      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );

      const result = await response.json();
      const story = result?.candidates?.[0]?.content?.parts?.[0]?.text || "❌ Error generating story.";
      document.getElementById("output").innerText = story;
    }
  </script>
</body>
</html>
